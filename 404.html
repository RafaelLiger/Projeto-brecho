<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página Não Encontrada | Brechó Vavá</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .error-container {
      text-align: center;
      max-width: 600px;
      animation: slideUp 0.6s ease;
    }

    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      color: #059669;
      line-height: 1;
      margin: 0;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .error-title {
      font-size: 2rem;
      color: #111827;
      margin: 1rem 0 0.5rem 0;
      font-weight: 700;
    }

    .error-description {
      font-size: 1.125rem;
      color: #6b7280;
      margin: 0 0 2rem 0;
      line-height: 1.6;
    }

    .error-emoji {
      font-size: 4rem;
      margin: 1rem 0;
      display: block;
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .btn-home {
      padding: 0.875rem 2rem;
      background: #059669;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn-home:hover {
      background: #047857;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .btn-contact {
      padding: 0.875rem 2rem;
      background: white;
      color: #059669;
      border: 2px solid #059669;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-contact:hover {
      background: #f0fdf4;
    }

    .error-footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #e5e7eb;
      color: #9ca3af;
      font-size: 0.875rem;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    .error-emoji {
      animation: float 3s ease-in-out infinite;
    }

    @media (max-width: 640px) {
      .error-code {
        font-size: 4rem;
      }

      .error-title {
        font-size: 1.5rem;
      }

      .error-description {
        font-size: 1rem;
      }

      .error-actions {
        flex-direction: column;
      }

      .btn-home,
      .btn-contact {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1 class="error-code">404</h1>
    <span class="error-emoji">🔍</span>
    <h2 class="error-title">Página Não Encontrada</h2>
    <p class="error-description">
      Desculpe, a página que você está procurando não existe ou foi movida. 
      Vamos ajudá-lo a encontrar o que você precisa!
    </p>

    <div class="error-actions">
      <button class="btn-home" onclick="window.location.href='index.html'">
        ← Voltar ao Início
      </button>
      <button class="btn-contact" onclick="window.location.href='index.html#contact'">
        📞 Entre em Contato
      </button>
    </div>

    <div class="error-footer">
      <p>
        💡 Dica: Verifique a URL digitada e tente novamente. 
        Se o problema persistir, entre em contato conosco!
      </p>
    </div>
  </div>
</body>
</html>
