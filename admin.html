<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Brechó Vavá</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: var(--bg-lighter);
    }

    .admin-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 20px;
      padding-top: 6rem;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .admin-header h1 {
      color: var(--dark);
      font-size: 2.25rem;
      margin: 0;
    }

    .admin-header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: var(--white);
      border-radius: 0.5rem;
      box-shadow: var(--shadow-sm);
    }

    .user-avatar {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--primary);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
    }

    .user-details p {
      margin: 0;
      font-size: 0.875rem;
    }

    .user-details p:first-child {
      font-weight: 500;
      color: var(--dark);
    }

    .user-details p:last-child {
      color: var(--text-light);
    }

    .logout-btn {
      padding: 0.75rem 1.5rem;
      background: #ef4444;
      color: var(--white);
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .admin-card {
      background: var(--white);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: var(--shadow-md);
    }

    .admin-card h2 {
      color: var(--dark);
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--dark);
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
    }

    .btn-cadastrar {
      width: 100%;
      padding: 0.875rem;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .btn-cadastrar:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-cadastrar:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    .products-table {
      background: var(--white);
      border-radius: 1rem;
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .products-table h2 {
      padding: 2rem;
      margin: 0;
      border-bottom: 1px solid var(--border);
      color: var(--dark);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table thead {
      background: var(--bg-lighter);
      border-bottom: 2px solid var(--border);
    }

    .table th {
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--dark);
      font-size: 0.875rem;
      text-transform: uppercase;
    }

    .table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .table tbody tr:hover {
      background: var(--bg-lighter);
    }

    .product-image {
      width: 60px;
      height: 60px;
      border-radius: 0.375rem;
      object-fit: cover;
    }

    .btn-delete {
      padding: 0.5rem 1rem;
      background: #ef4444;
      color: var(--white);
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-delete:hover {
      background: #dc2626;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
    }

    .empty-state p {
      margin: 0;
    }

    .message {
      padding: 1rem;
      border-radius: 0.375rem;
      margin-bottom: 1rem;
      display: none;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      border-left: 4px solid #059669;
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #b91c1c;
      border-left: 4px solid #ef4444;
      display: block;
    }

    @media (max-width: 1024px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .admin-header-actions {
        width: 100%;
        flex-direction: column;
      }

      .admin-header-actions > * {
        width: 100%;
      }

      .table {
        display: block;
        overflow-x: auto;
      }

      .table th,
      .table td {
        padding: 0.75rem;
        font-size: 0.875rem;
      }

      .product-image {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="admin-container" id="adminPanel" style="display: none;">
    <!-- Header -->
    <div class="admin-header">
      <div>
        <h1>Painel do Administrador</h1>
        <p style="color: var(--text-light); margin: 0;">Gerenciar produtos do Brechó Vavá</p>
      </div>
      <div class="admin-header-actions">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">👤</div>
          <div class="user-details">
            <p id="userEmail">Admin</p>
            <p>Acesso total</p>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="admin-grid">
      <!-- Form Card -->
      <div class="admin-card">
        <h2>📦 Cadastrar Produto</h2>
        
        <div class="message" id="formMessage"></div>

        <form id="cadastroForm" onsubmit="handleCadastro(event)">
          <div class="form-group">
            <label for="nome">Nome da peça</label>
            <input 
              type="text" 
              id="nome" 
              placeholder="Ex: Vestido Vintage Floral" 
              required
            >
          </div>

          <div class="form-group">
            <label for="preco">Preço (R$)</label>
            <input 
              type="number" 
              id="preco" 
              placeholder="89,90" 
              step="0.01"
              min="0"
              required
            >
          </div>

          <div class="form-group">
            <label for="foto">Foto do produto</label>
            <input 
              type="file" 
              id="foto" 
              accept="image/*" 
              required
            >
          </div>

          <button type="submit" class="btn-cadastrar" id="btnCadastrar">
            Cadastrar Produto
          </button>
        </form>
      </div>

      <!-- Stats Card -->
      <div class="admin-card">
        <h2>📊 Estatísticas</h2>
        <div style="display: grid; gap: 1.5rem;">
          <div>
            <p style="margin: 0 0 0.5rem 0; color: var(--text-light); font-size: 0.875rem; text-transform: uppercase;">Total de Produtos</p>
            <p style="margin: 0; font-size: 2.25rem; font-weight: 700; color: var(--primary);" id="totalProducts">0</p>
          </div>
          <div>
            <p style="margin: 0 0 0.5rem 0; color: var(--text-light); font-size: 0.875rem; text-transform: uppercase;">Último cadastro</p>
            <p style="margin: 0; font-size: 1rem; color: var(--text);" id="lastProduct">Ainda não há produtos</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Products Table -->
    <div class="products-table">
      <h2 style="padding: 2rem; margin: 0; border-bottom: 1px solid var(--border);">📋 Produtos Cadastrados</h2>
      <div id="tabelaProdutos"></div>
    </div>
  </div>

  <script type="module" src="script-admin.js"></script>
</body>

</html>
