<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Área de login do administrador do Brechó Vavá para gerenciar o catalogo de produtos.">
  <title>Login Admin - Brechó Vavá</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page" role="main">
    <section class="auth-card" aria-labelledby="login-title">
      <h1 id="login-title">Login do Administrador</h1>
      <form class="auth-form" onsubmit="event.preventDefault(); login();" aria-label="Formulário de login do administrador">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Senha" required>

        <button type="submit">Entrar</button>
      </form>
    </section>
  </main>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5iVkMUSZ-0FHF5sdNZB3wsm1qluLpDO8",
  authDomain: "brechovava.firebaseapp.com",
  projectId: "brechovava",
  storageBucket: "brechovava.firebasestorage.app",
  messagingSenderId: "285901923260",
  appId: "1:285901923260:web:0fef96eb59e5d6a6bdc1b9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = "admin.html";
  } catch (e) {
    alert("Email ou senha incorretos");
  }
};
  </script>
</body>
</html>
